<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeetCode AI 子代理监控中心</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-color: #3b82f6;
            --card-hover: rgba(51, 65, 85, 0.8);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(59, 130, 246, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(16, 185, 129, 0.15), transparent 25%);
            background-attachment: fixed;
            color: var(--text-primary);
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding: 24px 32px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            animation: fadeIn 0.8s ease-out;
        }

        .title {
            margin: 0;
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            margin: 8px 0 0 0;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .stats-container {
            display: flex;
            gap: 20px;
        }

        .stat-box {
            background: rgba(15, 23, 42, 0.6);
            padding: 12px 24px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 24px;
        }

        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 24px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            animation: slideUp 0.6s ease-out backwards;
        }

        .card:hover {
            transform: translateY(-5px);
            background: var(--card-hover);
            box-shadow: 0 12px 40px -10px rgba(0, 0, 0, 0.4);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background-color: var(--status-color, var(--text-secondary));
            border-radius: 4px 0 0 4px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }

        .problem-id {
            font-size: 18px;
            font-weight: 600;
            margin: 0;
            line-height: 1.4;
            max-width: 80%;
            word-wrap: break-word;
        }

        .status-badge {
            background-color: rgba(255,255,255,0.1);
            color: var(--status-color, var(--text-primary));
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            border: 1px solid var(--status-color, var(--glass-border));
            white-space: nowrap;
        }

        .progress-steps {
            display: flex;
            justify-content: space-between;
            margin-top: 24px;
            position: relative;
        }

        .progress-steps::before {
            content: '';
            position: absolute;
            top: 12px;
            left: 10px;
            right: 10px;
            height: 2px;
            background: rgba(255, 255, 255, 0.1);
            z-index: 1;
        }

        .step {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            z-index: 2;
            width: 25%;
        }

        .step-dot {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #1e293b;
            border: 2px solid #475569;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .step.active .step-dot {
            background: var(--status-color);
            border-color: var(--status-color);
            box-shadow: 0 0 10px var(--status-color);
        }

        .step-icon {
            color: #fff;
            font-size: 12px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .step.active .step-icon {
            opacity: 1;
        }

        .step-label {
            font-size: 11px;
            color: var(--text-secondary);
            text-align: center;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .step.active .step-label {
            color: var(--text-primary);
        }

        .refresh-btn {
            background: rgba(59, 130, 246, 0.2);
            border: 1px solid rgba(59, 130, 246, 0.4);
            color: #60a5fa;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: inherit;
        }

        .refresh-btn:hover {
            background: rgba(59, 130, 246, 0.3);
            border-color: #60a5fa;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        .spinning { animation: spin 1s linear infinite; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .loader {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 200px;
            width: 100%;
        }

        .lds-ripple {
            display: inline-block;
            position: relative;
            width: 80px;
            height: 80px;
        }
        .lds-ripple div {
            position: absolute;
            border: 4px solid var(--accent-color);
            opacity: 1;
            border-radius: 50%;
            animation: lds-ripple 1s cubic-bezier(0, 0.2, 0.8, 1) infinite;
        }
        .lds-ripple div:nth-child(2) { animation-delay: -0.5s; }
        @keyframes lds-ripple {
            0% { top: 36px; left: 36px; width: 0; height: 0; opacity: 0; }
            4.9% { top: 36px; left: 36px; width: 0; height: 0; opacity: 0; }
            5% { top: 36px; left: 36px; width: 0; height: 0; opacity: 1; }
            100% { top: 0px; left: 0px; width: 72px; height: 72px; opacity: 0; }
        }

        /* 倒计时条 */
        .progress-bar-container {
            width: 100%;
            height: 3px;
            background: rgba(255,255,255,0.1);
            position: fixed;
            top: 0;
            left: 0;
            z-index: 100;
        }
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            width: 100%;
            transition: width 1s linear;
        }

    </style>
</head>
<body>
    <div class="progress-bar-container">
        <div class="progress-bar" id="countdown-bar"></div>
    </div>

    <div class="container">
        <header class="header">
            <div>
                <h1 class="title">TDD Agent 监控面板</h1>
                <p class="subtitle">LeetCode 子代理任务进展实时追踪 &nbsp;·&nbsp; <span id="last-update">--</span>更新</p>
            </div>
            
            <div class="stats-container">
                <div class="stat-box">
                    <div class="stat-value" id="stat-total">0</div>
                    <div class="stat-label">总题目数</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="stat-completed" style="color: #10b981;">0</div>
                    <div class="stat-label">实现完毕</div>
                </div>
            </div>

            <button class="refresh-btn" onclick="fetchData()">
                <svg id="refresh-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="23 4 23 10 17 10"></polyline>
                    <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
                </svg>
                手动刷新
            </button>
        </header>

        <div id="loader" class="loader">
            <div class="lds-ripple"><div></div><div></div></div>
        </div>

        <div class="grid" id="grid">
            <!-- Cards will be injected here -->
        </div>
    </div>

    <script>
        const API_URL = '/api/status';
        let refreshInterval = 60; // 60 seconds
        let countdown = refreshInterval;
        let timer;

        async function fetchData() {
            const refreshIcon = document.getElementById('refresh-icon');
            refreshIcon.classList.add('spinning');
            
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                renderCards(data);
                updateStats(data);
                
                const now = new Date();
                document.getElementById('last-update').innerText = now.toLocaleTimeString();
            } catch (error) {
                console.error("Failed to fetch status:", error);
            } finally {
                setTimeout(() => refreshIcon.classList.remove('spinning'), 500);
            }
            
            resetCountdown();
        }

        function renderCards(data) {
            const grid = document.getElementById('grid');
            document.getElementById('loader').style.display = 'none';
            grid.innerHTML = '';

            data.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.style.setProperty('--status-color', item.color);
                card.style.animationDelay = `${index * 0.05}s`;

                // Calculate steps
                const s1 = item.hasRaw ? 'active' : '';
                const s2 = item.hasProblem ? 'active' : '';
                const s3 = item.hasTest ? 'active' : '';
                const s4 = item.isImplemented ? 'active' : '';

                card.innerHTML = `
                    <div class="card-header">
                        <h3 class="problem-id">${item.id}</h3>
                        <span class="status-badge">${item.state}</span>
                    </div>
                    
                    <div class="progress-steps">
                        <div class="step ${s1}">
                            <div class="step-dot"><span class="step-icon">✓</span></div>
                            <span class="step-label">拉取任务</span>
                        </div>
                        <div class="step ${s2}">
                            <div class="step-dot"><span class="step-icon">✓</span></div>
                            <span class="step-label">定义探针</span>
                        </div>
                        <div class="step ${s3}">
                            <div class="step-dot"><span class="step-icon">✓</span></div>
                            <span class="step-label">编写法则</span>
                        </div>
                        <div class="step ${s4}">
                            <div class="step-dot"><span class="step-icon">★</span></div>
                            <span class="step-label">攻克实现</span>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function updateStats(data) {
            document.getElementById('stat-total').innerText = data.length;
            const completed = data.filter(d => d.isImplemented).length;
            document.getElementById('stat-completed').innerText = completed;
        }

        function resetCountdown() {
            countdown = refreshInterval;
            updateCountdownUI();
        }

        function startTimer() {
            if(timer) clearInterval(timer);
            timer = setInterval(() => {
                countdown--;
                updateCountdownUI();
                if (countdown <= 0) {
                    fetchData();
                }
            }, 1000);
        }

        function updateCountdownUI() {
            const bar = document.getElementById('countdown-bar');
            const percent = (countdown / refreshInterval) * 100;
            bar.style.width = `${percent}%`;
        }

        // Initialize
        fetchData();
        startTimer();
    </script>
</body>
</html>
